naftiko: 1.0.0-alpha2
info:
  label: Tink Payments
  description: Initiate, retrieve, cancel, and refund PSD2 Payment Initiation Service payments via Tink and manage recurring mandates.
  tags:
    - Tink
    - Open Banking
    - Payments
    - PSD2
    - Pay by Bank
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      TINK_BEARER_TOKEN: TINK_BEARER_TOKEN
capability:
  consumes:
    - type: http
      namespace: payments
      baseUri: https://api.tink.com
      description: Tink Payments business capability.
      resources:
        - name: payments
          path: /payments
          operations:
            - name: initiate
              method: POST
              description: Initiate a payment.
              outputRawFormat: json
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
        - name: payment
          path: /payments/{paymentId}
          operations:
            - name: get
              method: GET
              description: Retrieve a payment.
              outputRawFormat: json
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
        - name: payment-cancel
          path: /payments/{paymentId}/cancel
          operations:
            - name: cancel
              method: POST
              description: Cancel a payment.
              outputRawFormat: json
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
        - name: payment-refunds
          path: /payments/{paymentId}/refunds
          operations:
            - name: refund
              method: POST
              description: Refund a payment.
              outputRawFormat: json
              inputParameters:
                - name: paymentId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
        - name: mandates
          path: /payments/mandates
          operations:
            - name: createmandate
              method: POST
              description: Create a payment mandate.
              outputRawFormat: json
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
        - name: mandate
          path: /payments/mandates/{id}
          operations:
            - name: getmandate
              method: GET
              description: Retrieve a mandate.
              outputRawFormat: json
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
            - name: revokemandate
              method: DELETE
              description: Revoke a mandate.
              outputRawFormat: json
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
      authentication:
        type: bearer
        value: '{{env.TINK_BEARER_TOKEN}}'
        placement: header
  exposes:
    - type: rest
      namespace: payments-rest
      port: 8080
      description: REST adapter for Tink Payments.
      resources:
        - path: /v1/payments
          name: payments
          operations:
            - method: POST
              name: initiate
              call: payments.initiate
              with:
                body: rest.body
