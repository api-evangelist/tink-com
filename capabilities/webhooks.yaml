naftiko: 1.0.0-alpha2
info:
  label: Tink Webhooks
  description: Manage Tink webhook endpoints to receive asynchronous events for reports, payments, refunds, and credential updates.
  tags:
    - Tink
    - Webhooks
    - Events
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      TINK_BEARER_TOKEN: TINK_BEARER_TOKEN
capability:
  consumes:
    - type: http
      namespace: webhooks
      baseUri: https://api.tink.com
      description: Tink Webhooks business capability.
      resources:
        - name: webhook-endpoints
          path: /events/v2/webhook-endpoints
          operations:
            - name: create
              method: POST
              description: Create a webhook endpoint.
              outputRawFormat: json
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
            - name: list
              method: GET
              description: List webhook endpoints.
              outputRawFormat: json
        - name: webhook-endpoint
          path: /events/v2/webhook-endpoints/{endpointId}
          operations:
            - name: get
              method: GET
              description: Retrieve a webhook endpoint.
              outputRawFormat: json
              inputParameters:
                - name: endpointId
                  in: path
                  type: string
                  required: true
            - name: update
              method: PATCH
              description: Update a webhook endpoint.
              outputRawFormat: json
              inputParameters:
                - name: endpointId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
            - name: delete
              method: DELETE
              description: Delete a webhook endpoint.
              outputRawFormat: json
              inputParameters:
                - name: endpointId
                  in: path
                  type: string
                  required: true
      authentication:
        type: bearer
        value: '{{env.TINK_BEARER_TOKEN}}'
        placement: header
  exposes:
    - type: rest
      namespace: webhooks-rest
      port: 8080
      description: REST adapter for Tink Webhooks.
      resources:
        - path: /v1/webhook-endpoints
          name: webhook-endpoints
          operations:
            - method: POST
              name: create
              call: webhooks.create
              with:
                body: rest.body
